<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Flood Zones WMS Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/maplibre-gl@5.4.0/dist/maplibre-gl.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 260px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
      padding: 14px;
    }

    .panel h1 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .layer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .layer-row label {
      cursor: pointer;
      flex: 1;
    }

    .opacity-wrap input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h1>WMS Test</h1>

    <div class="layer-row">
      <input type="checkbox" id="toggle-flood-zones" />
      <label for="toggle-flood-zones">Flood Zones WMS</label>
    </div>

    <div class="opacity-wrap">
      <input
        type="range"
        id="opacity-flood-zones"
        min="0"
        max="1"
        step="0.05"
        value="1"
      />
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
